name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Decode Cert
        env:
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrEmpty($env:WIN_CERT_BASE64)) { return }
          $certBytes = [System.Convert]::FromBase64String($env:WIN_CERT_BASE64)
          $certPath = [System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), "win_cert.p12")
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "CSC_LINK=file://$certPath" >> $env:GITHUB_ENV
          echo "CSC_KEY_PASSWORD=${{ secrets.WIN_CERT_PASSWORD }}" >> $env:GITHUB_ENV
        shell: powershell
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
        continue-on-error: true
      - name: Check builds
        run: ls release-builds/
        shell: bash
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release-builds/*.exe
            release-builds/*.exe.blockmap

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools fakeroot dpkg-dev
          npm ci
      - name: Build Linux ARM64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux-arm
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release-builds/*.AppImage
            release-builds/*.deb

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install dependencies
        run: npm ci
      - name: Build APK
        run: |
          npm run build:mobile
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mkdir -p ../release-builds
          cp app/build/outputs/apk/debug/app-debug.apk ../release-builds/emerald-timer-${{ github.ref_name }}.apk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            release-builds/*.apk

  publish:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true
      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Emerald Timer ${{ github.ref_name }} - Professional Edition (Added Dark Mode)" \
            --draft=false \
            --prerelease=false \
            --notes "## 💎 Emerald Timer ${{ github.ref_name }} 正式版
            此版本包含了全新的 **Professional Edition (Dark Mode)** 设计，从底层重构了视觉体感。

            ### 🌟 核心更新 (Core Updates)
            * **暗黑模式支持 (Added Dark Mode)**：全面适配 Zinc-950 深色体系，减少用眼疲劳。
            * **专业视觉重构**：采用全新的 Zinc 色彩策略，更沉稳、更专注的设计语言。
            * **辉光效果优化**：重新设计的计时器辉光，更均匀且不突兀。
            * **响应式统计网格**：优化了统计页面的响应式布局。
            * **生产环境清理**：移除了所有内置的 Demo 数据，现在是一款纯净的记录工具。

            ### 📦 包含构建 (Included Builds)
            * **Windows x64**: 安装版与便携版 (.exe)
            * **Linux ARM64**: AppImage 镜像
            * **Android**: 原生 APK 安装包

            ---
            *本版本由 GitHub Actions 自动构建发布。*" \
            dist/* || (gh release edit ${{ github.ref_name }} --draft=false --prerelease=false && gh release upload ${{ github.ref_name }} dist/* --clobber)
