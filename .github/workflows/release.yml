name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Decode Cert
        env:
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrEmpty($env:WIN_CERT_BASE64)) { return }
          $certBytes = [System.Convert]::FromBase64String($env:WIN_CERT_BASE64)
          $certPath = [System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), "win_cert.p12")
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "CSC_LINK=file://$certPath" >> $env:GITHUB_ENV
          echo "CSC_KEY_PASSWORD=${{ secrets.WIN_CERT_PASSWORD }}" >> $env:GITHUB_ENV
        shell: powershell
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
        continue-on-error: true
      - name: Check builds
        run: ls release-builds/
        shell: bash
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release-builds/*.exe
            release-builds/*.exe.blockmap

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools fakeroot dpkg-dev
          npm ci
      - name: Build Linux ARM64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux-arm
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release-builds/*.AppImage
            release-builds/*.deb

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install dependencies
        run: npm ci
      - name: Build APK
        run: |
          npm run build:mobile
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mkdir -p ../release-builds
          cp app/build/outputs/apk/debug/app-debug.apk ../release-builds/emerald-timer-${{ github.ref_name }}.apk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            release-builds/*.apk

  publish:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME=${{ github.ref_name }}
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME=$(node -p "require('./package.json').version")
            TAG_NAME="v$TAG_NAME"
          fi
          
          # 检查是否存在同名的 Draft 并删除，确保不阻塞正式版发布
          EXISTING_DRAFT=$(gh release list --exclude-drafts=false | grep "$TAG_NAME" | grep "Draft" | cut -f1) || true
          if [ ! -z "$EXISTING_DRAFT" ]; then
            gh release delete "$TAG_NAME" -y
          fi
          
          # 宽泛查找构建产物，并通过 -print0 + bash 数组安全处理带空格路径
          mapfile -d '' -t FILES < <(find ./dist -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.apk" -o -name "*.deb" -o -name "*.blockmap" \) -print0)

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No release assets found under ./dist"
            exit 1
          fi

          echo "Found files to upload:"
          printf '%s\n' "${FILES[@]}"

          # 创建或更新 Release，并上传产物
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${FILES[@]}" --clobber
          else
            gh release create "$TAG_NAME" \
              --title "Emerald Timer $TAG_NAME" \
              --generate-notes \
              --latest \
              "${FILES[@]}"
          fi

          # 强制设置为正式版并标记 Latest
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG_NAME --jq '.id')
          gh api -X PATCH repos/${{ github.repository }}/releases/$RELEASE_ID -f draft=false -f prerelease=false -f make_latest=true >/dev/null
